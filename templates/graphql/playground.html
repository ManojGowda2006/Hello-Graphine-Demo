<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="user-scalable=no, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, minimal-ui"
    />
    <title>GraphQL Playground</title>
    <link
      rel="shortcut icon"
      href="https://cdn.jsdelivr.net/npm/graphql-playground-react@1.7.22/build/favicon.png"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@saleor/graphql-playground@3.0.0-1/dist/umd/index.css"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <div
      id="root"
      data-endpoint="{{ api_url }}"
      {%
      if
      query
      %}data-query="{{ query }}"
      {%
      endif
      %}
    ></div>
    <script
      src="https://cdn.jsdelivr.net/npm/@saleor/graphql-playground@3.0.0-1/dist/umd/index.js"
      crossorigin="anonymous"
    ></script>

    <script>
      const root = document.querySelector("#root");
      const endpoint = root.dataset.endpoint;
      const query = root.dataset.query;

      createPlayground(root, { query, endpoint });
    </script>
  </body>
</html>
